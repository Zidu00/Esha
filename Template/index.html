<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Landingpage – SONGTITLE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ============================

  <!-- ============================
       BASIS-STYLES
       ============================ -->
  <style>
    :root {
      --accent-gold: #d4a75c;
      --accent-amber: #e6b980;
      --text-light: #f5f5f5;
      --spotify-green: #1DB954;
      --apple-red: #ff3b30;
      --tiktok-black: #000;
      --instagram-purple: #5a2a82;
    }

    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: var(--text-light);
      text-align: center;
      padding: 10px;
      transition: background 1.5s ease;
      animation: bgPulse 12s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
      100% { filter: brightness(1); }
    }

    h1 {
      margin-bottom: 14px;
      font-size: 26px;
      color: var(--accent-amber);
      text-shadow: 0 0 6px rgba(0,0,0,0.6);
    }

    img.cover {
      border-radius: 10px;
      box-shadow: 0 0 14px rgba(0,0,0,0.6);
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    img.cover:hover {
      transform: scale(1.03);
    }

    /* Tabelle kompakt */
    table.platform-table {
      margin: 0 auto 14px auto;
      width: 300px;
      border-collapse: collapse;
    }

    table.platform-table td {
      vertical-align: middle;
      padding: 2px 3px !important;
      line-height: 1 !important;
    }

    td.logo-cell {
      text-align: right;
      width: 35%;
    }

    td.button-cell {
      text-align: left;
      width: 65%;
    }

    /* Buttons kompakt + Hover */
    a.button {
      display: inline-block;
      padding: 6px 10px !important;
      font-size: var(--button-font-size);
      border-radius: 6px;
      text-decoration: none;
      white-space: nowrap;
      width: 180px; /* alle Buttons gleich breit */
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Button-Farben */
    a.button.spotify { background: var(--spotify-green); color: #fff; }
    a.button.apple { background: var(--apple-red); color: #fff; }
    a.button.presave { background: var(--accent-gold); color: #000; }
    a.button.instagram { background: var(--instagram-purple); color: #fff; }
    a.button.tiktok { background: var(--tiktok-black); color: #fff; }

    /* Consent Banner */
    #consent-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #222;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 14px;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.4);
    }

    #consent-banner button {
      padding: 8px 14px;
      margin-left: 10px;
      background: var(--accent-gold);
      border: none;
      color: #000;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1 id="song-title"></h1>

  <!-- Album Cover -->
  <img id="cover-img" class="cover" alt="Album Cover">

  <!-- Presave -->
  <table class="platform-table">
    <tr>
      <td class="logo-cell"><img id="presave-logo"></td>
      <td class="button-cell"><a id="presave-button" class="button presave">Presave</a></td>
