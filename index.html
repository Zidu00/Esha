<html lang="de">
<head>

  <script>

    const SPOTIFY_LOGO = "SPOTIFYLOGO.png";      // Spotify Logo Datei

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    img.cover {
      width: 300px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .platform {
      margin: 20px 0;
    }

    .platform img {
      width: 140px;
      margin-bottom: 10px;
    }

    a.button {
      display: inline-block;
      padding: 12px 20px;
      background: #1DB954;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      margin-top: 10px;
    }

    a.button.apple {
      background: #fff;
      color: #000;
    }

    #consent-banner {
      position: fixed;
      bottom: 0;

      right: 0;
      background: #222;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 16px;
    }

    #consent-banner button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #1DB954;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

  <img id="cover-img" class="cover" alt="Album Cover">
